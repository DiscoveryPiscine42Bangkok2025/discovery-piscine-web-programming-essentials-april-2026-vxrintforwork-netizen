<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card - Wil 42</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="card.css">
</head>
<body>

    <div class="card-container">
        
        <table class="profile-table">
            
            <tr>
                <td>
                    <h2 class="card-title">User Profile Card</h2>
                </td>
            </tr>
            
            <tr>
                <td class="image-cell">
                    <img src="https://i0.wp.com/clownfishtv.com/wp-content/uploads/2024/08/rip-boomerang-is-cartoon-network-next-youtube-thumbnail.jpg?ssl=1" alt="Wil 42 Profile" class="profile-img">
                </td>
            </tr>
            
            <tr>
                <td>
                    <div class="login-name">Wil 42</div>
                </td>
            </tr>
            
            <tr>
                <td>
                    <p class="details-text">Level 25, The answer</p>
                    <p class="details-text">42Paris</p>
                </td>
            </tr>
            
            <tr>
                <td>
                    <div class="social-icons">
                        <i class="fas fa-globe"></i> <i class="fab fa-twitter"></i> <i class="fab fa-linkedin-in"></i> <i class="fab fa-facebook-f"></i> </div>
                </td>
            </tr>
            
            <tr>
                <td class="contact-cell">
                    <div class="contact-btn">Contact</div>
                </td>
            </tr>
            
        </table>
    </div>

</body>
</html>
