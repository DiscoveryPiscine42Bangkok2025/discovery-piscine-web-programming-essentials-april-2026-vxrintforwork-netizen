<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Table</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }

        .wrapper {
            width: 100%;
            height: 100vh;
            overflow: auto;
        }

        table {
            width: 100%;
            height: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th, td {
            border: 2px solid #333;
            text-align: center;
            padding: 8px;
            word-wrap: break-word;
        }

        thead {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <table>
            <thead>
                <tr>
                    <th>หัวข้อ 1</th>
                    <th>หัวข้อ 2</th>
                    <th>หัวข้อ 3</th>
                    <th>หัวข้อ 4</th>
                    <th>หัวข้อ 5</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>ข้อมูล 1</td>
                    <td>ข้อมูล 2</td>
                    <td>ข้อมูล 3</td>
                    <td>ข้อมูล 4</td>
                    <td>ข้อมูล 5</td>
                </tr>
                <tr>
                    <td>ข้อมูล 6</td>
                    <td>ข้อมูล 7</td>
                    <td>ข้อมูล 8</td>
                    <td>ข้อมูล 9</td>
                    <td>ข้อมูล 10</td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
