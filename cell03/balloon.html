<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลูกโป่งมหัศจรรย์</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }

        /* สร้างลูกโป่งขนาด 200x200 และทำให้เป็นวงกลม */
        #balloon {
            width: 200px;
            height: 200px;
            background-color: red;
            border-radius: 50%;
            cursor: pointer;
            transition: background-color 0.2s; /* เพิ่มความนุ่มนวลเวลาเปลี่ยนสี */
        }
    </style>
</head>
<body>

    <div id="balloon"></div>

    <script>
        const balloon = document.getElementById('balloon');
        let currentSize = 200;
        
        // ลำดับสี: 0 = red, 1 = green, 2 = blue
        const colors = ['red', 'green', 'blue'];
        let colorIndex = 0;

        // ฟังก์ชันอัปเดตการแสดงผล
        function updateBalloon() {
            balloon.style.width = currentSize + 'px';
            balloon.style.height = currentSize + 'px';
            balloon.style.backgroundColor = colors[colorIndex];
        }

        // เมื่อมีการคลิก (โตขึ้น 10px และเปลี่ยนสีไปข้างหน้า)
        balloon.addEventListener('click', () => {
            currentSize += 10;
            
            // ตรวจสอบการระเบิด (ถ้าเกิน 420px)
            if (currentSize > 420) {
                currentSize = 200;
                colorIndex = 0;
            } else {
                // เปลี่ยนสี: แดง -> เขียว -> น้ำเงิน -> แดง
                colorIndex = (colorIndex + 1) % colors.length;
            }
            updateBalloon();
        });

        // เมื่อเมาส์ออกจากลูกโป่ง (เล็กลง 5px และเปลี่ยนสีย้อนกลับ)
        balloon.addEventListener('mouseleave', () => {
            // ลดขนาดลง 5px แต่ต้องไม่ต่ำกว่า 200px
            if (currentSize > 200) {
                currentSize -= 5;
            }

            // เปลี่ยนสีย้อนกลับ: แดง -> น้ำเงิน -> เขียว -> แดง
            // (index - 1 + length) % length เป็นเทคนิคการวนลูปย้อนกลับในโปรแกรมมิ่ง
            colorIndex = (colorIndex - 1 + colors.length) % colors.length;
            
            updateBalloon();
        });
    </script>

</body>
</html>
